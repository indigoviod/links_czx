<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html {
  scroll-behavior: smooth;
}

body{
  font-family: "Meiryo";
  background:#0e0e10;
  color:#e5e5e5;
  line-height:1.8;

section{
  padding:80px 60px;
  max-width:1100px;
  margin:auto;
  position:relative;
  z-index:2;
}

@media (max-width: 768px) {
  section {
    padding: 40px 24px;
  }
}

h2{
  font-size:14px;
  letter-spacing:4px;
  color:#666;
  margin-bottom:40px;
}

h3{
  font-weight:400;
  margin-bottom:12px;
}

p{
  color:#9ca3af;
}

ul{
  list-style:none;
}

li{
  margin-bottom:16px;
  color:#cfcfcf;
  font-size:18px;
  font-weight:300;
}

/* header */
header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:24px 60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(14,14,16,0.6);
  backdrop-filter:blur(10px);
  z-index:10;
}

nav {
  display: flex;
}

nav a{
  text-decoration:none;
  color:#8a8f98;
  margin-left:30px;
  font-size:13px;
  transition:0.3s;
}

nav a:hover{
  color:#ffffff;
}

/* hamburger menu */
.hamburger {
  display: none;
  flex-direction: column;
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px;
  width: 32px;
  height: 32px;
  z-index: 11;
  justify-content: center;
  align-items: center;
}

.hamburger span {
  width: 22px;
  height: 2.5px;
  background: #e5e5e5;
  margin: 4px 0;
  transition: 0.3s ease;
  display: block;
  border-radius: 2px;
}

.hamburger:hover span {
  background: #7aa2ff;
}

.hamburger.active span:nth-child(1) {
  transform: rotate(45deg) translate(8px, 8px);
}

.hamburger.active span:nth-child(2) {
  opacity: 0;
}

.hamburger.active span:nth-child(3) {
  transform: rotate(-45deg) translate(7px, -7px);
}

/* koukoku page hero */
.page-hero{
  height:40vh;
  display:flex;
  align-items:center;
  padding:80px 60px;
  padding-top:120px;
  margin-top:0;
}

.page-hero-inner{
  max-width:900px;
}

.page-hero h1{
  font-size:48px;
  font-weight:300;
  line-height:1.2;
  color:#7aa2ff;
  margin-bottom:16px;
}

.page-hero p{
  font-size:15px;
  color:#9ca3af;
  max-width:600px;
}

/* announcement container */
.announcement-container {
  display: grid;
  grid-template-columns: repeat(1, 1fr);
  gap: 20px;
}

.announcement-item {
  padding:24px;
  background:rgba(255,255,255,0.02);
  border-radius:8px;
  border-left:3px solid #7aa2ff;
  transition:0.3s;
}

.announcement-item:hover {
  background:rgba(255,255,255,0.05);
  transform:translateX(4px);
}

.announcement-date {
  font-size:13px;
  color:#666;
  letter-spacing:1px;
  margin-bottom:8px;
}

.announcement-title {
  font-size:18px;
  color:#e5e5e5;
  font-weight:400;
  margin-bottom:12px;
}

.announcement-content {
  font-size:15px;
  color:#9ca3af;
  line-height:1.8;
}

/* empty state */
.empty-state {
  text-align:center;
  padding:60px 40px;
  background:rgba(255,255,255,0.02);
  border-radius:8px;
}

.empty-state p {
  font-size:16px;
  color:#9ca3af;
  margin-bottom:12px;
}

/* canvas */
#network{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}

/* footer */
.footer {
  border-top: 1px solid #1f1f22;
  margin-top: 120px;
  padding: 40px 60px;
  font-size: 12px;
  color: #6b7280;
}

.footer-inner {
  max-width: 1100px;
  margin: auto;
  display: flex;
  justify-content: space-between;
}

.footer p {
  letter-spacing: 1px;
}

@media (max-width: 768px) {
  header {
    padding: 20px 24px;
  }

  .hamburger {
    display: flex;
  }

  nav {
    position: fixed;
    top: 60px;
    left: 0;
    width: 100%;
    height: calc(100vh - 60px);
    background: rgba(14,14,16,0.95);
    backdrop-filter: blur(10px);
    flex-direction: column;
    justify-content: flex-start;
    padding-top: 20px;
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    z-index: 9;
  }

  nav.active {
    transform: translateX(0);
  }

  nav a {
    margin-left: 0;
    margin-bottom: 0;
    padding: 12px 24px;
    display: block;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .page-hero {
    height: 30vh;
    padding: 0 24px;
    padding-top: 80px;
    margin-top: 0;
  }

  .page-hero h1 {
    font-size: 32px;
  }

  .footer {
    padding: 40px 24px;
  }

  .footer-inner {
    flex-direction: column;
    gap: 16px;
  }
}

/*浮现特效*/
.fade-in {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}

.fade-in.show {
  opacity: 1;
  transform: translateY(0);
}

</style>
</head>

<body>

<canvas id="network"></canvas>

<header>
  <div class="logo">
    <a href="../index.html">InnoLinks</a>
  </div>
  <button class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </button>
  <nav id="nav-menu">
    <a href="../index.html#services">Services</a>
    <a href="../index.html#about">About</a>
    <a href="../index.html#contact">Contact</a>
    <a href="./Announcement.html">Announcement</a>
    <a href="./inquiry.html">Inquiry</a>
  </nav>
</header>

<section class="page-hero">
  <div class="page-hero-inner">
    <h1>電子公告</h1>
    <p>InnoLinks株式会社の最新情報および公告をお知らせします。</p>
  </div>
</section>

<section class="fade-in">
  <h2>ANNOUNCEMENT</h2>
  <div class="announcement-container">
    <div class="empty-state">
      <p>現在公告すべき事項はありません。</p>
      <p style="font-size: 13px; color: #6b7280; margin-top: 12px;">当社の公告は、定款の定めによりこのウェブサイトに掲載します。</p>
    </div>
  </div>
</section>

<script>
let mouse = {
  x: null,
  y: null,
  radius: 100
};

window.addEventListener("mousemove", (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

window.addEventListener("mouseleave", () => {
  mouse.x = null;
  mouse.y = null;
});

const canvas = document.getElementById("network");
const ctx = canvas.getContext("2d");

let particles=[];

// 根据设备类型调整粒子参数
const isMobileDevice = window.matchMedia("(hover: none)").matches;
const COUNT = isMobileDevice ? 40 : 80;
const DIST = isMobileDevice ? 90 : 140;

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

class Particle{
  constructor(){
    this.x=Math.random()*canvas.width;
    this.y=Math.random()*canvas.height;
    this.vx=(Math.random()-0.5)*0.3;
    this.vy=(Math.random()-0.5)*0.3;

    this.energy = 0;
    this.awake = false;
    this.phase = 0;
    this.displayEnergy = 0;
  }

  move(){
    this.x+=this.vx;
    this.y+=this.vy;

    if(this.x<0||this.x>canvas.width)this.vx*=-1;
    if(this.y<0||this.y>canvas.height)this.vy*=-1;
  }

  update(connections){
    let nearMouse = false;

    if(mouse.x !== null){
      let dx = this.x - mouse.x;
      let dy = this.y - mouse.y;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if(dist < mouse.radius){
        nearMouse = true;
        this.vx += (mouse.x - this.x) * 0.0003;
        this.vy += (mouse.y - this.y) * 0.0003;
      }
    }

    let triggerChance = nearMouse ? 0.08 : 0.02;
    let threshold = nearMouse ? 3 : 7;

    if(connections > threshold && Math.random() < triggerChance){
      this.awake = true;
      this.phase = 0;
    }

    if(this.awake){
      this.phase += 0.02;
      let t = this.phase;

      if(t < 0.4){
        this.energy = t / 0.4;
      }
      else if(t < 0.7){
        this.energy = 1;
      }
      else{
        this.energy = 1 - (t - 0.7) / 0.3;
      }

      if(this.energy > 0.6 && Math.random() < 0.01){
        this.energy += 0.1;
      }

      if(this.phase >= 1){
        this.awake = false;
        this.energy = 0;
      }
    }
    this.displayEnergy += (this.energy - this.displayEnergy) * 0.05;
  }

  draw(){
    let radius = 1.2 + this.displayEnergy * 1.8;
    let alpha = 0.4 + this.energy * 0.6;

    ctx.beginPath();

    if(this.awake){
      ctx.shadowBlur = 20 * this.displayEnergy;
      ctx.shadowColor = "#7aa2ff";
    }else{
      ctx.shadowBlur = 0;
    }

    ctx.arc(this.x,this.y,radius,0,Math.PI*2);
    ctx.fillStyle=`rgba(122,162,255,${alpha})`;
    ctx.fill();
  }
}

for(let i=0;i<COUNT;i++)particles.push(new Particle());

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  let connectionCounts = new Array(particles.length).fill(0);

  for(let i=0;i<particles.length;i++){
    for(let j=i+1;j<particles.length;j++){
      let dx=particles[i].x-particles[j].x;
      let dy=particles[i].y-particles[j].y;
      let d=Math.sqrt(dx*dx+dy*dy);

      if(d<DIST){
        connectionCounts[i]++;
        connectionCounts[j]++;
      }
    }
  }

  particles.forEach((p,i)=>{
    p.move();
    p.update(connectionCounts[i]);
  });

  for(let i=0;i<particles.length;i++){
    for(let j=i+1;j<particles.length;j++){
      let dx=particles[i].x-particles[j].x;
      let dy=particles[i].y-particles[j].y;
      let d=Math.sqrt(dx*dx+dy*dy);

      if(d<DIST){
        let baseAlpha = 0.08 - d/2000;
        let boost = Math.max(particles[i].displayEnergy, particles[j].displayEnergy);

        ctx.beginPath();
        ctx.moveTo(particles[i].x,particles[i].y);
        ctx.lineTo(particles[j].x,particles[j].y);

        ctx.strokeStyle = `rgba(122,162,255,${baseAlpha + boost*0.4})`;
        ctx.lineWidth = 1 + boost*1.5;

        ctx.stroke();
      }
    }
  }

  particles.forEach(p=>p.draw());

  requestAnimationFrame(animate);
}
animate();

/* fade-in */
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("show");
    }
  });
}, { threshold: 0.2 });

document.querySelectorAll(".fade-in").forEach(el => {
  observer.observe(el);
});

// 汉堡菜单切换
const hamburger = document.getElementById("hamburger");
const navMenu = document.getElementById("nav-menu");
const navLinks = navMenu.querySelectorAll("a");

hamburger.addEventListener("click", () => {
  hamburger.classList.toggle("active");
  navMenu.classList.toggle("active");
});

// 点击导航链接时关闭菜单
navLinks.forEach(link => {
  link.addEventListener("click", () => {
    hamburger.classList.remove("active");
    navMenu.classList.remove("active");
  });
});
</script>

</body>
<footer class="footer">
  <div class="footer-inner">
    <div class="footer-left">
      <p>© 2026 InnoLinks株式会社</p>
    </div>
    <div class="footer-right">
      <p>Quietly building the future.</p>
    </div>
  </div>
</footer>
